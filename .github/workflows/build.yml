name: Build APK
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node 22
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install dependencies
      run: cd CodeDroidPro && npm ci

    - name: Build React app
      run: cd CodeDroidPro && npm run build

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Capacitor CLI
      run: npm install -g @capacitor/cli

    - name: Add Android platform
      run: cd CodeDroidPro && npx cap add android || true

    - name: Copy web assets
      run: cd CodeDroidPro && npx cap copy android

    - name: Make gradlew executable
      run: chmod +x CodeDroidPro/android/gradlew

    - name: Build Debug APK
      run: cd CodeDroidPro/android && ./gradlew assembleDebug --no-daemon

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: CodeDroidPro-APK
        path: CodeDroidPro/android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
